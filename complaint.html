<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.navbar{
background:#c2410c;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:450px;
margin:40px auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

.invalid{
border:2px solid red;
}

button{
width:100%;
padding:12px;
background:#f97316;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.passwordBox{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:black;
}

.progressBar{
width:100%;
background:#334155;
height:6px;
border-radius:4px;
overflow:hidden;
margin:10px 0;
}

.progressFill{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.3s linear;
}

.success{color:lightgreen;}
.error{color:#ef4444;}

</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin-login.html">Admin</a>
</div>

<div class="container">

<h2>Register Complaint</h2>

<input type="text" id="name" placeholder="Name">

<input type="text" id="village" placeholder="Village">

<input type="text" id="phone" placeholder="Phone (10 digits)">

<input type="email" id="email" placeholder="Email">

<textarea id="complaint" placeholder="Write complaint"></textarea>

<input type="file" id="attachment">

<button id="submitBtn" onclick="submitComplaint()">Submit Complaint</button>

<div id="message"></div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

async function submitComplaint(){

const msg=document.getElementById("message");

msg.innerHTML="Submitting...";

const fileInput=document.getElementById("attachment");

let fileData="";
let fileName="";

if(fileInput.files.length>0){

const file=fileInput.files[0];

fileName=file.name;

const reader=new FileReader();

fileData=await new Promise(resolve=>{
reader.onload=()=>resolve(reader.result.split(',')[1]);
reader.readAsDataURL(file);
});

}

const data=new URLSearchParams();

data.append("action","insertComplaint");
data.append("name",document.getElementById("name").value);
data.append("village",document.getElementById("village").value);
data.append("phone",document.getElementById("phone").value);
data.append("email",document.getElementById("email").value);
data.append("complaint",document.getElementById("complaint").value);
data.append("fileData",fileData);
data.append("fileName",fileName);

fetch(scriptURL,{
method:"POST",
body:data
})
.then(res=>res.text())
.then(res=>{
if(res==="Inserted"){
msg.innerHTML="<span class='success'>Complaint Submitted</span>";
}else{
msg.innerHTML="<span class='error'>Server Error</span>";
}
})

}

</script>

</body>
</html>
