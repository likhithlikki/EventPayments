<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complaint</title>

<link rel="stylesheet" href="complaint.css">

</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin-login.html">Admin</a>
</div>

<div class="container">

<h2>Submit Complaint</h2>

<form id="complaintForm">

<input type="text" id="name" placeholder="Name" required>

<input type="text" id="village" placeholder="Village" required>

<input type="tel"
id="phone"
placeholder="Phone (10 digits)"
maxlength="10"
pattern="[0-9]{10}"
required>

<input type="email" id="email" placeholder="Email" required>

<textarea id="complaint" placeholder="Complaint" required></textarea>

<label>Upload File (Max 2MB)</label>

<input type="file" id="fileUpload">

<button type="submit">Submit Complaint</button>

</form>

<div id="loader" class="loader"></div>

<div id="msg"></div>

</div>

<script>

const scriptURL="YOUR_WEB_APP_URL";

document.getElementById("phone").addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,"");

});

document.getElementById("complaintForm").addEventListener("submit",function(e){

e.preventDefault();

const phone=document.getElementById("phone").value;

if(phone.length!==10){

alert("Phone number must be exactly 10 digits");

return;

}

const file=document.getElementById("fileUpload").files[0];

if(file && file.size>2*1024*1024){

alert("File must be less than 2MB");

return;

}

document.getElementById("loader").style.display="block";

let reader=new FileReader();

reader.onloadend=function(){

const data=new URLSearchParams();

data.append("action","insertComplaint");

data.append("name",document.getElementById("name").value);

data.append("village",document.getElementById("village").value);

data.append("phone",phone);

data.append("email",document.getElementById("email").value);

data.append("complaint",document.getElementById("complaint").value);

data.append("file",reader.result||"");

data.append("filename",file?file.name:"");

fetch(scriptURL,{
method:"POST",
body:data
})
.then(r=>r.text())
.then(res=>{

document.getElementById("loader").style.display="none";

document.getElementById("msg").innerHTML="Complaint Submitted";

document.getElementById("complaintForm").reset();

});

};

if(file){

reader.readAsDataURL(file);

}else{

reader.onloadend();

}

});

</script>

</body>

</html>
