<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Complaint</title>

<link rel="stylesheet" href="complaint.css">

</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin-login.html">Admin</a>
</div>

<div class="container">

<h2>Submit Complaint</h2>

<form id="complaintForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="text" id="village" placeholder="Village" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email" required>

<textarea id="complaint" placeholder="Enter your complaint" required></textarea>

<label>Upload File (Max 2MB)</label>

<input type="file" id="fileUpload">

<button type="submit">Submit Complaint</button>

</form>

<div id="loader" class="loader"></div>

<div id="message"></div>

</div>

<script>

const scriptURL="YOUR_WEB_APP_URL";

document.getElementById("complaintForm").addEventListener("submit",function(e){

e.preventDefault();

const loader=document.getElementById("loader");
const msg=document.getElementById("message");

loader.style.display="block";
msg.innerHTML="";

const file=document.getElementById("fileUpload").files[0];

if(file && file.size>2*1024*1024){

loader.style.display="none";

msg.innerHTML="File size must be less than 2MB";

return;

}

let reader=new FileReader();

reader.onloadend=function(){

const base64=reader.result;

const data=new URLSearchParams();

data.append("action","insertComplaint");

data.append("name",document.getElementById("name").value);

data.append("village",document.getElementById("village").value);

data.append("phone",document.getElementById("phone").value);

data.append("email",document.getElementById("email").value);

data.append("complaint",document.getElementById("complaint").value);

data.append("file",base64);

data.append("filename",file?file.name:"");

fetch(scriptURL,{
method:"POST",
body:data
})
.then(r=>r.text())
.then(res=>{

loader.style.display="none";

msg.innerHTML="Complaint submitted successfully";

document.getElementById("complaintForm").reset();

});

};

if(file){

reader.readAsDataURL(file);

}else{

reader.onloadend();

}

});

</script>

</body>

</html>
