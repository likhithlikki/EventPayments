<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Complaint</title>

<style>

body{
font-family:Arial;
background:#eef2f8;
margin:0;
}

/* NAVBAR */

.navbar{
background:#0b1c3d;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
width:360px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* INPUT */

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#152a63;
}

/* LOADER */

.loader{
display:none;
text-align:center;
margin-top:15px;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid #0b1c3d;
border-radius:50%;
width:24px;
height:24px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="navbar">
Complaint Form
</div>

<div class="container">

<input id="name" placeholder="Name">

<input id="village" placeholder="Village">

<input id="phone" placeholder="Phone">

<input id="email" placeholder="Email (optional)">

<textarea id="complaint" placeholder="Write your complaint"></textarea>

<button onclick="submitComplaint()">Submit Complaint</button>

<div class="loader" id="loader">

<div class="spinner"></div>

<p>Submitting...</p>

</div>

</div>

<script>

/***********************
CONFIG
***********************/

const API="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

/***********************
SUBMIT COMPLAINT
***********************/

function submitComplaint(){

const name=document.getElementById("name").value;
const village=document.getElementById("village").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;
const complaint=document.getElementById("complaint").value;

if(!name||!village||!phone||!complaint){

alert("Please fill all required fields");

return;

}

document.getElementById("loader").style.display="block";

const controller=new AbortController();

setTimeout(()=>{

controller.abort();

},10000);

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

action:"complaint",
name:name,
village:village,
phone:phone,
email:email,
complaint:complaint

}),
signal:controller.signal
})

.then(r=>r.json())

.then(res=>{

document.getElementById("loader").style.display="none";

if(res.status==="submitted"){

alert("Complaint submitted successfully");

document.getElementById("name").value="";
document.getElementById("village").value="";
document.getElementById("phone").value="";
document.getElementById("email").value="";
document.getElementById("complaint").value="";

}else{

alert("Submission failed");

}

})

.catch(()=>{

document.getElementById("loader").style.display="none";

alert("Server not responding");

});

}

</script>

</body>
</html>
