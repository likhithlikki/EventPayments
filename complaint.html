<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Complaint</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.navbar{
background:#0b1c3d;
padding:14px;
color:white;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#aaa;
}

.error{
border:1px solid red;
}

.loadingBar{
width:100%;
height:4px;
background:#ddd;
margin-top:10px;
overflow:hidden;
display:none;
}

.loadingProgress{
height:100%;
width:0%;
background:#007bff;
animation:load 5s linear forwards;
}

@keyframes load{

0%{width:0%}

60%{width:80%}

90%{width:95%}

100%{width:100%}

}

.note{
margin-top:20px;
font-size:14px;
color:#444;
}

.contact{
margin-top:10px;
display:flex;
gap:20px;
}

.contact img{
width:28px;
}

.success{
text-align:center;
color:green;
margin-top:15px;
}

</style>

</head>

<body>

<div class="navbar">

<div>
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="admin.html">Admin Panel</a>
<a href="complaint.html">Complaint</a>
</div>

</div>

<div class="container">

<h2>Register Complaint</h2>

<input id="name" placeholder="Name">

<input id="village" placeholder="Village">

<input id="phone" placeholder="Phone Number">

<input id="email" placeholder="Email (optional)">

<textarea id="complaint" placeholder="Write your complaint"></textarea>

<input type="file" id="file">

<button id="submitBtn" onclick="submitComplaint()">Submit Complaint</button>

<div class="loadingBar" id="loadingBar">
<div class="loadingProgress"></div>
</div>

<div class="success" id="successMsg"></div>

<div class="note">

If not resolved within 24 hours contact:

<div class="contact">

<a href="mailto:likithmuddada@gmail.com">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
</a>

<a href="https://wa.me/919014844036">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

</div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

function validate(){

let valid=true;

const name=document.getElementById("name");
const village=document.getElementById("village");
const phone=document.getElementById("phone");
const complaint=document.getElementById("complaint");

[name,village,phone,complaint].forEach(i=>i.classList.remove("error"));

if(!/^[A-Za-z ]+$/.test(name.value)){
name.classList.add("error");
valid=false;
}

if(village.value.length<2){
village.classList.add("error");
valid=false;
}

if(!/^[6-9][0-9]{9}$/.test(phone.value)){
phone.classList.add("error");
valid=false;
}

if(complaint.value.length<5){
complaint.classList.add("error");
valid=false;
}

const file=document.getElementById("file").files[0];

if(file){

if(file.size>5*1024*1024){

alert("File size must be below 5MB");

valid=false;

}

}

return valid;

}

function submitComplaint(){

if(!validate()) return;

document.getElementById("loadingBar").style.display="block";

const data={
action:"registerComplaint",
name:document.getElementById("name").value,
village:document.getElementById("village").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
complaint:document.getElementById("complaint").value
};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{

document.getElementById("loadingBar").style.display="none";

document.getElementById("successMsg").innerText="Complaint registered successfully";

document.getElementById("name").value="";
document.getElementById("village").value="";
document.getElementById("phone").value="";
document.getElementById("email").value="";
document.getElementById("complaint").value="";
document.getElementById("file").value="";

});

}

</script>

</body>
</html>
