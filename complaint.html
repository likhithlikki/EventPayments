<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

.navbar{background:#c2410c;padding:15px;text-align:center;}
.navbar a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}

.container{max-width:450px;margin:40px auto;background:#1e293b;padding:20px;border-radius:10px;}

input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;}

.invalid{border:2px solid red;}

button{width:100%;padding:12px;background:#f97316;color:white;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
button:disabled{background:gray;cursor:not-allowed;}

.progressBar{width:100%;background:#334155;height:6px;border-radius:4px;overflow:hidden;margin:10px 0;}
.progressFill{height:100%;width:0%;background:#22c55e;animation:loading 1.5s infinite;}
@keyframes loading{0%{width:0%}50%{width:80%}100%{width:0%}}

.success{color:lightgreen;}
.error{color:#ef4444;}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>
</div>

<div class="container">
<h2>Register Complaint</h2>

<input id="name" placeholder="Name">
<input id="village" placeholder="Village">
<input id="phone" placeholder="Phone">
<textarea id="complaint" placeholder="Write your complaint (min 10 characters)"></textarea>
<input type="file" id="attachment" accept="image/*,.pdf">

<button id="submitBtn" disabled onclick="submitComplaint()">Submit Complaint</button>

<div id="message"></div>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

const nameInput=name;
const phoneInput=phone;
const complaintInput=document.getElementById("complaint");
const submitBtn=document.getElementById("submitBtn");

function validate(){
let valid=true;

if(!/^[A-Za-z ]+$/.test(nameInput.value.trim())){
  nameInput.classList.add("invalid"); valid=false;
}else nameInput.classList.remove("invalid");

if(!/^[6-9]\d{9}$/.test(phoneInput.value.trim())){
  phoneInput.classList.add("invalid"); valid=false;
}else phoneInput.classList.remove("invalid");

if(complaintInput.value.trim().length<10){
  complaintInput.classList.add("invalid"); valid=false;
}else complaintInput.classList.remove("invalid");

submitBtn.disabled=!valid;
}

nameInput.addEventListener("input",validate);
phoneInput.addEventListener("input",function(){
  this.value=this.value.replace(/\D/g,"").slice(0,10);
  validate();
});
complaintInput.addEventListener("input",validate);

async function submitComplaint(){
if(submitBtn.disabled) return;

const msg=document.getElementById("message");
msg.innerHTML=`<div class="progressBar"><div class="progressFill"></div></div>`;

const fileInput=document.getElementById("attachment");
let fileData="", fileName="";

if(fileInput.files.length>0){
  const file=fileInput.files[0];

  if(file.size > 5*1024*1024){
    msg.innerHTML="<span class='error'>File must be under 5MB</span>";
    return;
  }

  fileName=file.name;
  const reader=new FileReader();
  fileData=await new Promise(resolve=>{
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

const data=new URLSearchParams();
data.append("action","insertComplaint");
data.append("name",nameInput.value.trim());
data.append("village",village.value.trim());
data.append("phone",phoneInput.value.trim());
data.append("complaint",complaintInput.value.trim());
data.append("fileData",fileData);
data.append("fileName",fileName);

fetch(scriptURL,{method:"POST",body:data})
.then(res=>res.text())
.then(res=>{
if(res==="Inserted"){
msg.innerHTML="<span class='success'>Complaint submitted successfully</span>";
nameInput.value=""; village.value=""; phoneInput.value="";
complaintInput.value=""; fileInput.value="";
submitBtn.disabled=true;
}else{
msg.innerHTML="<span class='error'>Server error</span>";
}
})
.catch(()=>msg.innerHTML="<span class='error'>Server connection error</span>");
}
</script>
</body>
</html>
