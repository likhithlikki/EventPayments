<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint</title>

<link rel="stylesheet" href="complaint.css">

<style>

/* EVENT NAME STYLE */
#eventTitle{
text-align:center;
font-size:28px;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="status.html">Verify Status</a>
  <a href="complaint.html">Complaint</a>
  <a href="admin.html">Admin</a>
</div>

<!-- EVENT NAME (ADDED) -->
<div id="eventTitle"></div>

<div class="container">
<h2>Register Complaint</h2>

<input type="text" id="name" placeholder="Name (letters only)">
<input type="text" id="village" placeholder="Village">
<input type="text" id="phone" placeholder="Phone (10 digits)">
<input type="email" id="email" placeholder="Email">
<textarea id="complaint" placeholder="Write complaint (min 10 characters)"></textarea>
<input type="file" id="attachment" accept="image/*,.pdf">

<button id="submitBtn" disabled onclick="submitComplaint()">Submit Complaint</button>

<div id="message"></div>

<p style="font-size:12px;margin-top:15px;">
If not resolved within 24 hours contact:<br>
📧 likithmuddada@gmail.com<br>
📱 WhatsApp: 9014844036
</p>

</div>

<script>

const scriptURL="PASTE_YOUR_EXEC_URL_HERE";

const nameInput=document.getElementById("name");
const phoneInput=document.getElementById("phone");
const complaintInput=document.getElementById("complaint");
const emailInput=document.getElementById("email");
const submitBtn=document.getElementById("submitBtn");

/* LOAD EVENT NAME FROM SETTINGS */
fetch(scriptURL+"?action=getSettings")
.then(res=>res.json())
.then(data=>{
if(data.EventName){
document.getElementById("eventTitle").innerText=data.EventName;
}
});

/* VALIDATION */

function validate(){

let valid=true;

if(!/^[A-Za-z ]+$/.test(nameInput.value.trim())){
  nameInput.classList.add("invalid");
  valid=false;
}else nameInput.classList.remove("invalid");

if(!/^[6-9]\d{9}$/.test(phoneInput.value.trim())){
  phoneInput.classList.add("invalid");
  valid=false;
}else phoneInput.classList.remove("invalid");

/* EMAIL FORMAT CHECK (ADDED) */

if(emailInput.value.trim()!==""){

if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())){
emailInput.classList.add("invalid");
valid=false;
}else{
emailInput.classList.remove("invalid");
}

}

if(complaintInput.value.trim().length<10){
  complaintInput.classList.add("invalid");
  valid=false;
}else complaintInput.classList.remove("invalid");

submitBtn.disabled=!valid;

}

nameInput.addEventListener("input",validate);

phoneInput.addEventListener("input",function(){
  this.value=this.value.replace(/\D/g,"").slice(0,10);
  validate();
});

complaintInput.addEventListener("input",validate);

/* EMAIL VALIDATION EVENT (ADDED) */
emailInput.addEventListener("input",validate);


/* PROGRESS BAR */

function startProgressBar(){
  const msg=document.getElementById("message");

  msg.innerHTML='<div class="progressBar"><div class="progressFill" id="progressFill"></div></div>';

  const bar=document.getElementById("progressFill");

  setTimeout(()=>{bar.style.width="80%";},100);
  setTimeout(()=>{bar.style.width="90%";},3000);
  setTimeout(()=>{bar.style.width="99%";},5000);
}

function completeProgress(){
  const bar=document.getElementById("progressFill");
  if(bar) bar.style.width="100%";
}


/* SUBMIT COMPLAINT */

async function submitComplaint(){

if(submitBtn.disabled) return;

const msg=document.getElementById("message");

startProgressBar();

const fileInput=document.getElementById("attachment");

let fileData="";
let fileName="";

if(fileInput.files.length>0){

  const file=fileInput.files[0];

  const maxSize=5*1024*1024;

  if(file.size > maxSize){
    msg.innerHTML="<span class='error'>File must be under 5MB</span>";
    return;
  }

  fileName=file.name;

  const reader=new FileReader();

  fileData=await new Promise(resolve=>{
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });

}

const data=new URLSearchParams();

data.append("action","insertComplaint");
data.append("name",nameInput.value.trim());
data.append("village",document.getElementById("village").value.trim());
data.append("phone",phoneInput.value.trim());
data.append("email",emailInput.value.trim());
data.append("complaint",complaintInput.value.trim());
data.append("fileData",fileData);
data.append("fileName",fileName);

fetch(scriptURL,{method:"POST",body:data})

.then(res=>res.text())

.then(res=>{

completeProgress();

if(res==="Inserted"){

msg.innerHTML="<span class='success'>Complaint submitted successfully</span>";

nameInput.value="";
phoneInput.value="";
complaintInput.value="";
document.getElementById("village").value="";
emailInput.value="";
fileInput.value="";
submitBtn.disabled=true;

}else{

msg.innerHTML="<span class='error'>Server error</span>";

}

})
.catch(()=>{
msg.innerHTML="<span class='error'>Server connection error</span>";
});

}

</script>

</body>
</html>
