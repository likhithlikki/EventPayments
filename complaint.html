<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.navbar{
  background:#c2410c;
  padding:15px;
  text-align:center;
}

.navbar a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:500px;
  margin:40px auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#f97316;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

button:hover{
  opacity:0.9;
}

.loader{
  border:4px solid #f3f3f3;
  border-top:4px solid #f97316;
  border-radius:50%;
  width:25px;
  height:25px;
  animation:spin 1s linear infinite;
  margin:15px auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="status.html">Verify Status</a>
  <a href="complaint.html">Complaint</a>
  <a href="admin.html">Admin</a>
</div>

<div class="container">
<h2>Register Complaint</h2>

<input type="text" id="name" placeholder="Name" required>
<input type="text" id="village" placeholder="Village" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="complaint" placeholder="Write your complaint..." rows="4"></textarea>

<label>Attach Screenshot (Optional)</label>
<input type="file" id="attachment" accept="image/*,.pdf">

<button onclick="submitComplaint()">Submit Complaint</button>

<div id="message"></div>

<p style="font-size:12px;margin-top:15px;">
If not resolved within 24 hours contact:<br>
📧 likithmuddada@gmail.com<br>
📱 WhatsApp: 9014844036
</p>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

async function submitComplaint(){

  const messageDiv = document.getElementById("message");
  messageDiv.innerHTML = "<div class='loader'></div>";

  const name = document.getElementById("name").value;
  const village = document.getElementById("village").value;
  const phone = document.getElementById("phone").value;
  const complaint = document.getElementById("complaint").value;
  const fileInput = document.getElementById("attachment");

  let fileData="";
  let fileName="";

  if(fileInput.files.length>0){
    const file=fileInput.files[0];
    fileName=file.name;

    const reader=new FileReader();
    fileData=await new Promise(resolve=>{
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
  }

  const data=new URLSearchParams();
  data.append("action","insertComplaint");
  data.append("name",name);
  data.append("village",village);
  data.append("phone",phone);
  data.append("complaint",complaint);
  data.append("fileData",fileData);
  data.append("fileName",fileName);

  fetch(scriptURL,{
    method:"POST",
    body:data
  })
  .then(res=>res.text())
  .then(()=>{
    messageDiv.innerHTML="<span style='color:lightgreen;'>Complaint submitted successfully</span>";
  })
  .catch(()=>{
    messageDiv.innerHTML="<span style='color:red;'>Server connection error</span>";
  });
}

</script>

</body>
</html>
