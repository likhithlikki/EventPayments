<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.navbar{
  background:#c2410c;
  padding:15px;
  text-align:center;
}

.navbar a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:450px;
  margin:40px auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#f97316;
  color:white;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.loader{
  border:4px solid #fff;
  border-top:4px solid #f97316;
  border-radius:50%;
  width:25px;
  height:25px;
  animation:spin 1s linear infinite;
  margin:10px auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.success{color:lightgreen;}
.error{color:#ef4444;}
</style>
</head>

<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="status.html">Verify Status</a>
  <a href="complaint.html">Complaint</a>
  <a href="admin.html">Admin</a>
</div>

<div class="container">
<h2>Register Complaint</h2>

<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="village" placeholder="Village" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="complaint" placeholder="Write your complaint..." rows="4"></textarea>

<label>Attach Screenshot (Optional)</label>
<input type="file" id="attachment" accept="image/*,.pdf">

<button onclick="submitComplaint()">Submit Complaint</button>

<div id="message"></div>

<p style="font-size:12px;margin-top:15px;">
If not resolved within 24 hours contact:<br>
📧 likithmuddada@gmail.com<br>
📱 WhatsApp: 9014844036
</p>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

async function submitComplaint(){

  const msg=document.getElementById("message");
  msg.innerHTML="<div class='loader'></div>";

  const name=document.getElementById("name").value.trim();
  const village=document.getElementById("village").value.trim();
  const phone=document.getElementById("phone").value.trim();
  const complaint=document.getElementById("complaint").value.trim();
  const fileInput=document.getElementById("attachment");

  if(!name || !village || !phone || !complaint){
    msg.innerHTML="<span class='error'>Please fill all fields</span>";
    return;
  }

  let fileData="";
  let fileName="";

  if(fileInput.files.length>0){
    const file=fileInput.files[0];
    fileName=file.name;

    const reader=new FileReader();
    fileData=await new Promise(resolve=>{
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
  }

  const data=new URLSearchParams();
  data.append("action","insertComplaint");
  data.append("name",name);
  data.append("village",village);
  data.append("phone",phone);
  data.append("complaint",complaint);
  data.append("fileData",fileData);
  data.append("fileName",fileName);

  fetch(scriptURL,{
    method:"POST",
    body:data
  })
  .then(res=>res.text())
  .then(res=>{
    if(res==="Inserted"){
      msg.innerHTML="<span class='success'>Complaint submitted successfully</span>";
      document.getElementById("name").value="";
      document.getElementById("village").value="";
      document.getElementById("phone").value="";
      document.getElementById("complaint").value="";
      document.getElementById("attachment").value="";
    }else{
      msg.innerHTML="<span class='error'>Server error</span>";
    }
  })
  .catch(()=>{
    msg.innerHTML="<span class='error'>Server connection failed</span>";
  });
}

</script>

</body>
</html>
