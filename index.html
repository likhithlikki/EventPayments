<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Event Contribution</title>

<style>

body{
font-family:Arial;
background:#eef2f8;
margin:0;
}

/* NAVBAR */

.navbar{
background:#0b1c3d;
padding:16px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
width:360px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* INPUT */

input{
width:100%;
padding:11px;
margin-top:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#152a63;
}

/* QR */

#qrBox{
text-align:center;
margin-top:20px;
}

/* LOADER */

.loader{
display:none;
margin-top:15px;
text-align:center;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid #0b1c3d;
border-radius:50%;
width:25px;
height:25px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="navbar">
Event Contribution
</div>

<div class="container">

<input id="name" placeholder="Name">

<input id="village" placeholder="Village">

<input id="phone" placeholder="Phone">

<input id="amount" placeholder="Amount">

<button onclick="generateQR()">Generate QR</button>

<div id="qrBox"></div>

<input id="utr" placeholder="Enter UTR after payment">

<button onclick="submitPayment()">Submit Payment</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Submitting...</p>
</div>

</div>

<script>

/***********************
CONFIG
***********************/

const API="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

let settings={};

/***********************
LOAD SETTINGS
***********************/

function loadSettings(){

fetch(API+"?action=settings")

.then(r=>r.json())

.then(data=>{

settings=data;

})

.catch(()=>{

alert("Server not responding");

});

}

loadSettings();

/***********************
GENERATE QR
***********************/

function generateQR(){

const amount=document.getElementById("amount").value;

if(!amount){

alert("Enter amount");

return;

}

const upi=settings["UPI ID"];

if(!upi){

alert("UPI not configured");

return;

}

const ref="REF"+Date.now();

const upiLink=
`upi://pay?pa=${upi}&pn=EventContribution&am=${amount}&cu=INR&tn=${ref}`;

const qr=
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="
+encodeURIComponent(upiLink);

document.getElementById("qrBox").innerHTML=
`<img src="${qr}">`;

}

/***********************
SUBMIT PAYMENT
***********************/

function submitPayment(){

const name=document.getElementById("name").value;
const village=document.getElementById("village").value;
const phone=document.getElementById("phone").value;
const amount=document.getElementById("amount").value;
const utr=document.getElementById("utr").value;

if(!name||!village||!phone||!amount||!utr){

alert("Fill all fields");

return;

}

document.getElementById("loader").style.display="block";

/* SERVER TIMEOUT */

const controller=new AbortController();

setTimeout(()=>{

controller.abort();

},10000);

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"submitPayment",
name:name,
village:village,
phone:phone,
amount:amount,
utr:utr
}),
signal:controller.signal
})

.then(r=>r.json())

.then(res=>{

document.getElementById("loader").style.display="none";

if(res.status==="success"){

alert("Payment submitted\nReference ID: "+res.ref);

window.location="status.html?ref="+res.ref;

}else{

alert("Payment failed");

}

})

.catch(()=>{

document.getElementById("loader").style.display="none";

alert("Server not responding");

});

}

</script>

</body>
</html>
