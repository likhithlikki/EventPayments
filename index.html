<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Contribution</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.navbar{background:#1e40af;padding:15px;text-align:center;}
.navbar a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
.container{max-width:400px;margin:40px auto;background:#1e293b;padding:20px;border-radius:10px;}
input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;}
button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.loader{border:4px solid #fff;border-top:4px solid #2563eb;border-radius:50%;width:25px;height:25px;animation:spin 1s linear infinite;margin:10px auto;}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>
</div>

<div class="container">
<h2>Event Contribution</h2>
<input id="name" placeholder="Name">
<input id="village" placeholder="Village">
<input id="phone" placeholder="Phone">
<input id="amount" type="number" placeholder="Amount">
<input id="utr" placeholder="UTR Number">
<button onclick="submit()">Submit</button>
<div id="msg"></div>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

function generateRefID(){ return "REF"+Date.now(); }

function submit(){

const msg=document.getElementById("msg");
msg.innerHTML="<div class='loader'></div>";

const data=new URLSearchParams();
data.append("action","insertPayment");
data.append("refid",generateRefID());
data.append("name",name.value);
data.append("village",village.value);
data.append("phone",phone.value);
data.append("amount",amount.value);
data.append("utr",utr.value);

fetch(scriptURL,{method:"POST",body:data})
.then(res=>res.text())
.then(res=>{
if(res==="Duplicate"){
msg.innerHTML="<span style='color:red'>Already submitted</span>";
}else{
msg.innerHTML="<span style='color:lightgreen'>Submitted Successfully</span>";
}
})
.catch(()=>msg.innerHTML="<span style='color:red'>Server Error</span>");
}
</script>

</body>
</html>
