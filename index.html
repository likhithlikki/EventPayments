<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Contribution</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.navbar{
background:#1e40af;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* Wedding Title */
#weddingTitle{
text-align:center;
font-size:30px;
font-weight:bold;
margin-top:15px;
}

.container{
max-width:420px;
margin:40px auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

.invalid{
border:2px solid red;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

#paymentSection{display:none;}
#receiptSection{display:none;}

.progressBar{
width:100%;
background:#334155;
height:6px;
border-radius:4px;
overflow:hidden;
margin:10px 0;
}

.progressFill{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.3s linear;
}

.success{color:lightgreen;}
.error{color:#ef4444;}

.receiptBox{
background:#111827;
padding:15px;
border-radius:8px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="navbar">

<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin-login.html">Admin</a>

</div>

<!-- Wedding Name -->
<div id="weddingTitle"></div>

<div class="container">

<h2 id="eventTitle">Event Contribution</h2>

<div id="formSection">

<input type="text" id="name" placeholder="Name (letters only)">
<input type="text" id="village" placeholder="Village">
<input type="text" id="phone" placeholder="Phone (10 digits)">
<input type="number" id="amount" placeholder="Amount (Min ₹50)">

<button id="proceedBtn" disabled onclick="goToPayment()">Proceed</button>

</div>

<div id="paymentSection">

<h3>Scan & Pay</h3>

<div id="qrcode"></div>

<button onclick="openUPI()">Open UPI App</button>

<input type="text" id="utr" placeholder="Enter UTR Number">

<button onclick="finishPayment()">Finish Payment</button>

</div>

<div id="receiptSection">

<div class="receiptBox" id="receiptContent"></div>

<button onclick="downloadReceipt()">Download Receipt</button>

</div>

<div id="message"></div>

</div>

<script src="index.js"></script>

</body>
</html>
