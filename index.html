<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Event Payment</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.navbar{
background:#0b1c3d;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

.error{
border:2px solid red;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#aaa;
}

.qr{
text-align:center;
margin-top:20px;
display:none;
}

.qr img{
width:200px;
}

.loadingBar{
width:100%;
height:4px;
background:#ddd;
margin-top:10px;
overflow:hidden;
display:none;
}

.loadingProgress{
height:100%;
width:0%;
background:#007bff;
}

.refBox{
margin-top:20px;
padding:15px;
background:#f4f6fb;
border-radius:6px;
text-align:center;
display:none;
}

.downloadBtn{
margin-top:10px;
background:#28a745;
}

</style>

</head>

<body>

<div class="navbar">

<div>
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="admin.html">Admin Panel</a>
<a href="complaint.html">Complaint</a>
</div>

</div>

<div class="container">

<h2>Event Contribution</h2>

<input id="name" placeholder="Name">

<input id="village" placeholder="Village">

<input id="phone" placeholder="Phone Number">

<input id="amount" placeholder="Amount (Minimum ₹50)">

<button id="proceedBtn" disabled onclick="showQR()">Proceed to Payment</button>

<div class="qr" id="qrBox">

<p>Scan & Pay</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay">

<input id="utr" placeholder="Enter UTR Number">

<button onclick="submitPayment()">Submit Payment</button>

</div>

<div class="loadingBar" id="loadingBar">
<div class="loadingProgress" id="progress"></div>
</div>

<div class="refBox" id="refBox">

<p>Note down reference number for future purpose</p>

<h3 id="refNumber"></h3>

<button class="downloadBtn" onclick="downloadReceipt()">Download Receipt</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

let refID="";

const nameInput=document.getElementById("name");
const villageInput=document.getElementById("village");
const phoneInput=document.getElementById("phone");
const amountInput=document.getElementById("amount");

[nameInput,villageInput,phoneInput,amountInput].forEach(el=>{
el.addEventListener("input",validate);
});

phoneInput.addEventListener("keypress",e=>{
if(!/[0-9]/.test(e.key)) e.preventDefault();
});

function validate(){

let valid=true;

nameInput.classList.remove("error");
phoneInput.classList.remove("error");
amountInput.classList.remove("error");

if(!/^[A-Za-z ]+$/.test(nameInput.value)){
nameInput.classList.add("error");
valid=false;
}

if(!/^[6-9][0-9]{9}$/.test(phoneInput.value)){
phoneInput.classList.add("error");
valid=false;
}

if(Number(amountInput.value)<50){
amountInput.classList.add("error");
valid=false;
}

document.getElementById("proceedBtn").disabled=!valid;

}

function showQR(){

document.getElementById("qrBox").style.display="block";

}

function startLoading(){

document.getElementById("loadingBar").style.display="block";

let p=document.getElementById("progress");

let width=0;

let interval=setInterval(()=>{

width+=5;

if(width<=80){
p.style.width=width+"%";
}

},150);

setTimeout(()=>{p.style.width="90%"},3000);
setTimeout(()=>{p.style.width="100%"},5000);

}

function submitPayment(){

const utr=document.getElementById("utr").value;

if(utr.length<6){
alert("Enter valid UTR");
return;
}

startLoading();

const data={
action:"submitPayment",
name:nameInput.value,
village:villageInput.value,
phone:phoneInput.value,
amount:amountInput.value,
utr:utr
};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{

refID=res.ref;

document.getElementById("loadingBar").style.display="none";

document.getElementById("refBox").style.display="block";

document.getElementById("refNumber").innerText=refID;

});

}

function downloadReceipt(){

window.open(API_URL+"?action=receipt&ref="+refID);

}

</script>

</body>
</html>
