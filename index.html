<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Contribution</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="navbar">

<a href="index.html">Event Contribution</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin-login.html">Admin</a>

</div>


<div class="container">

<h2 id="eventTitle">Event Contribution</h2>

<!-- FORM -->

<div id="formSection">

<input type="text" id="name" placeholder="Name (letters only)">

<input type="text" id="village" placeholder="Village">

<input type="text" id="phone" placeholder="Phone (10 digits)">

<input type="number" id="amount" placeholder="Amount (Min ₹50)">

<button id="proceedBtn" disabled onclick="goToPayment()">
Proceed
</button>

</div>


<!-- PAYMENT SECTION -->

<div id="paymentSection" style="display:none;">

<h3>Scan & Pay</h3>

<div id="qrcode"></div>

<button onclick="openUPI()">Open UPI App</button>

<input type="text" id="utr" placeholder="Enter UTR Number">

<button onclick="finishPayment()">Finish Payment</button>

</div>


<!-- RECEIPT -->

<div id="receiptSection" style="display:none;">

<h3>Payment Receipt</h3>

<div id="receiptBox">

<p><b>Reference ID:</b> <span id="rRef"></span></p>
<p><b>Name:</b> <span id="rName"></span></p>
<p><b>Village:</b> <span id="rVillage"></span></p>
<p><b>Phone:</b> <span id="rPhone"></span></p>
<p><b>Amount:</b> ₹<span id="rAmount"></span></p>
<p><b>UTR:</b> <span id="rUTR"></span></p>

<br>

<img src="sbi-logo.png" width="80">

<p style="margin-top:10px;font-size:12px;">
Digitally Verified Payment
</p>

<img src="sign.png" width="120">

</div>

</div>


<!-- LOADING / MESSAGE -->

<div id="message"></div>

</div>


<script src="index.js"></script>

</body>
</html>
