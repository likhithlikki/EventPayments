<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Contribution</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin-login.html">Admin</a>

</div>

<h1 class="eventHeader" id="eventTitle">Wedding of X & Y</h1>

<div class="container">

<h2>Event Contribution</h2>

<div id="formSection">

<input type="text" id="name" placeholder="Name (letters only)">
<input type="text" id="village" placeholder="Village">
<input type="text" id="phone" placeholder="Phone (10 digits)">
<input type="number" id="amount" placeholder="Amount (Min ₹50)">

<button id="proceedBtn" disabled onclick="goToPayment()">Proceed</button>

</div>


<div id="paymentSection">

<h3>Scan & Pay</h3>

<div id="qrcode"></div>

<button onclick="openUPI()">Open UPI App</button>

<input type="text" id="utr" placeholder="Enter UTR Number">

<button onclick="finishPayment()">Finish Payment</button>

</div>


<div id="message"></div>


<div id="receiptBox" style="display:none">

<div id="receipt">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/State_Bank_of_India_logo.svg/512px-State_Bank_of_India_logo.svg.png" width="40">

<h3>SBI Payment Receipt</h3>

<p id="r_name"></p>
<p id="r_village"></p>
<p id="r_phone"></p>
<p id="r_amount"></p>
<p id="r_utr"></p>
<p id="r_ref"></p>

<p class="sign">Digitally Verified</p>

</div>

</div>

</div>

<script src="index.js"></script>

</body>
</html>
