<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginBox{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.error{
color:#ef4444;
margin-top:10px;
}

.progressBar{
width:100%;
background:#334155;
height:6px;
border-radius:4px;
overflow:hidden;
margin-top:10px;
}

.progressFill{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.3s linear;
}

</style>
</head>

<body>

<div class="loginBox">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="message"></div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

function startProgressBar(){

const msg=document.getElementById("message");

msg.innerHTML='<div class="progressBar"><div class="progressFill" id="progressFill"></div></div>';

const bar=document.getElementById("progressFill");

setTimeout(()=>{bar.style.width="70%";},200);
setTimeout(()=>{bar.style.width="90%";},2000);

}

function completeProgress(){

const bar=document.getElementById("progressFill");

if(bar) bar.style.width="100%";

}

function login(){

const username=document.getElementById("username").value.trim();

const password=document.getElementById("password").value.trim();

const msg=document.getElementById("message");

if(!username || !password){

msg.innerHTML="<p class='error'>Enter username and password</p>";

return;

}

startProgressBar();

const data=new URLSearchParams();

data.append("action","loginAdmin");
data.append("username",username);
data.append("password",password);

fetch(scriptURL,{
method:"POST",
body:data
})

.then(res=>res.json())

.then(res=>{

completeProgress();

if(res.success){

sessionStorage.setItem("adminUser",username);
sessionStorage.setItem("adminRole",res.role);
sessionStorage.setItem("adminToken",res.token);
sessionStorage.setItem("loginTime",Date.now());

window.location="admin.html";

}
else{

msg.innerHTML="<p class='error'>Invalid username or password</p>";

}

})

.catch(()=>{

msg.innerHTML="<p class='error'>Server connection error</p>";

});

}

</script>

</body>
</html>
