<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

.passwordBox{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
color:black;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<div class="passwordBox">

<input type="password" id="password" placeholder="Password">

<span class="eye" onclick="togglePass()">👁</span>

</div>

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

function togglePass(){

const p=document.getElementById("password");

p.type=p.type==="password"?"text":"password";

}

function login(){

const username=document.getElementById("username").value;

const password=document.getElementById("password").value;

const msg=document.getElementById("msg");

const data=new URLSearchParams();

data.append("action","loginAdmin");
data.append("username",username);
data.append("password",password);

fetch(scriptURL,{
method:"POST",
body:data
})

.then(res=>res.json())

.then(res=>{

if(res.success){

sessionStorage.setItem("adminUser",username);
sessionStorage.setItem("adminRole",res.role);

window.location="admin.html";

}
else{

msg.innerHTML="<p class='error'>Invalid username or password</p>";

}

})

}

</script>

</body>
</html>
