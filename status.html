<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Status</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.navbar{
  background:#6b21a8;
  padding:15px;
  text-align:center;
}

.navbar a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:420px;
  margin:40px auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:#8b5cf6;
  color:white;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.resultBox{
  margin-top:15px;
  padding:15px;
  background:#111827;
  border-radius:6px;
}

.pending{color:#3b82f6;font-weight:bold;}
.verified{color:#22c55e;font-weight:bold;}
.notverified{color:#ef4444;font-weight:bold;}
.error{color:#ef4444;}

.progressBar{
  width:100%;
  background:#334155;
  height:6px;
  border-radius:4px;
  overflow:hidden;
  margin:10px 0;
}

.progressFill{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:width 0.3s linear;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>
</div>

<div class="container">
<h2>Check Payment Status</h2>

<input type="text" id="refid" placeholder="Enter Last 5 digits of reference no">
<button onclick="checkStatus()">Verify</button>

<div id="result"></div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

/* -------- PROGRESS BAR -------- */
function startProgressBar(){
  const result=document.getElementById("result");
  result.innerHTML='<div class="progressBar"><div class="progressFill" id="progressFill"></div></div>';
  const bar=document.getElementById("progressFill");

  setTimeout(()=>{bar.style.width="80%";},100);
  setTimeout(()=>{bar.style.width="90%";},3000);
  setTimeout(()=>{bar.style.width="99%";},5000);
}

function completeProgress(){
  const bar=document.getElementById("progressFill");
  if(bar) bar.style.width="100%";
}

/* -------- DATE FORMAT: 12 Mar 2026 -------- */
function formatDate(dateValue){

  if(!dateValue) return "";

  // If already formatted like 12 Mar 2026
  if(typeof dateValue === "string" && dateValue.includes(" ")){
    return dateValue;
  }

  const d=new Date(dateValue);
  if(isNaN(d)) return dateValue;

  const day=d.getDate();
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const month=monthNames[d.getMonth()];
  const year=d.getFullYear();

  return `${day} ${month} ${year}`;
}

/* -------- TIME FORMAT: 2:56 pm -------- */
function formatTime(timeValue){

  if(!timeValue) return "";

  // If already like 04:25 PM
  if(typeof timeValue === "string" && timeValue.toLowerCase().includes("m")){
    return timeValue.toLowerCase();
  }

  const d=new Date(timeValue);
  if(isNaN(d)) return timeValue;

  let hours=d.getHours();
  const minutes=d.getMinutes().toString().padStart(2,"0");
  const ampm=hours>=12 ? "pm" : "am";

  hours=hours%12;
  hours=hours ? hours : 12;

  return `${hours}:${minutes} ${ampm}`;
}

/* -------- MAIN FUNCTION -------- */
function checkStatus(){

const last5=document.getElementById("refid").value.trim();
const result=document.getElementById("result");

if(!/^\d{5}$/.test(last5)){
  result.innerHTML="<p class='error'>Enter exactly 5 digits</p>";
  return;
}

startProgressBar();

fetch(scriptURL+"?action=checkStatus&refid="+last5)
.then(res=>res.json())
.then(data=>{

completeProgress();

if(data.found===false){
result.innerHTML="<p class='error'>Invalid Reference ID</p>";
return;
}

/*
Sheet Structure:
0 Type
1 Date
2 Time
3 RefID
4 Name
5 Village
6 Phone
7 Amount
8 UTR
9 Status
10 Count
*/

let statusClass="pending";
if(data[9]==="Verified") statusClass="verified";
if(data[9]==="Not Verified") statusClass="notverified";

result.innerHTML=`
<div class="resultBox">
<p><strong>Name:</strong> ${data[4]}</p>
<p><strong>Village:</strong> ${data[5]}</p>
<p><strong>Phone:</strong> ${data[6]}</p>
<p><strong>Amount:</strong> ₹${data[7]}</p>
<p><strong>Date:</strong> ${formatDate(data[1])}</p>
<p><strong>Time:</strong> ${formatTime(data[2])}</p>
<p><strong>Status:</strong> <span class="${statusClass}">${data[9]}</span></p>
</div>
`;
})
.catch(()=>{
result.innerHTML="<p class='error'>Server connection error</p>";
});
}

</script>

</body>
</html>
