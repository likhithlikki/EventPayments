<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Verify Payment Status</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.navbar{
background:#0b1c3d;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#f4f6fb;
border-radius:6px;
display:none;
}

.statusVerified{
color:green;
font-weight:bold;
}

.statusPending{
color:#1a73e8;
font-weight:bold;
}

.statusRejected{
color:red;
font-weight:bold;
}

.loadingBar{
width:100%;
height:4px;
background:#ddd;
margin-top:10px;
overflow:hidden;
display:none;
}

.loadingProgress{
height:100%;
width:0%;
background:#007bff;
}

.error{
color:red;
margin-top:10px;
text-align:center;
}

.thanks{
margin-top:20px;
text-align:center;
color:#444;
}

</style>

</head>

<body>

<div class="navbar">

<div>
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="admin.html">Admin Panel</a>
<a href="complaint.html">Complaint</a>
</div>

</div>

<div class="container">

<h2>Check Payment Status</h2>

<input id="refInput" placeholder="Enter last 5 digits of Reference ID">

<button onclick="checkStatus()">Verify Status</button>

<div class="loadingBar" id="loadingBar">
<div class="loadingProgress" id="progress"></div>
</div>

<div class="error" id="errorMsg"></div>

<div class="result" id="resultBox">

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Village:</b> <span id="village"></span></p>
<p><b>Phone:</b> <span id="phone"></span></p>
<p><b>Amount:</b> ₹<span id="amount"></span></p>
<p><b>Date:</b> <span id="date"></span></p>
<p><b>Time:</b> <span id="time"></span></p>
<p><b>Status:</b> <span id="status"></span></p>

</div>

<div class="thanks">
Thank you for visiting
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

function startLoading(){

document.getElementById("loadingBar").style.display="block";

let p=document.getElementById("progress");

let width=0;

let interval=setInterval(()=>{

width+=5;

if(width<=80){
p.style.width=width+"%";
}

},150);

setTimeout(()=>{p.style.width="90%"},3000);
setTimeout(()=>{p.style.width="100%"},5000);

}

function checkStatus(){

let ref=document.getElementById("refInput").value.trim();

document.getElementById("errorMsg").innerText="";
document.getElementById("resultBox").style.display="none";

if(ref.length!==5){

document.getElementById("errorMsg").innerText="Enter last 5 digits of reference";

return;

}

startLoading();

fetch(API_URL+"?action=getStatus&ref="+ref)
.then(r=>r.json())
.then(data=>{

document.getElementById("loadingBar").style.display="none";

if(data.error){

document.getElementById("errorMsg").innerText="Reference not found";

return;

}

document.getElementById("resultBox").style.display="block";

document.getElementById("name").innerText=data.name;
document.getElementById("village").innerText=data.village;
document.getElementById("phone").innerText=data.phone;
document.getElementById("amount").innerText=data.amount;
document.getElementById("date").innerText=data.date;
document.getElementById("time").innerText=data.time;

let statusEl=document.getElementById("status");

statusEl.innerText=data.status;

statusEl.className="";

if(data.status=="Verified") statusEl.className="statusVerified";
if(data.status=="Pending") statusEl.className="statusPending";
if(data.status=="Not Verified") statusEl.className="statusRejected";

})

}

</script>

</body>
</html>
