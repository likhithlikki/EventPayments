<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Payment Status</title>

<style>

body{
font-family:Arial;
background:#eef2f8;
margin:0;
}

/* NAVBAR */

.navbar{
background:#0b1c3d;
padding:16px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
width:360px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* RESULT BOX */

.result{
margin-top:20px;
padding:15px;
border-radius:6px;
background:#f4f6fb;
}

.row{
margin-bottom:8px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* LOADER */

.loader{
display:none;
text-align:center;
margin-top:20px;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid #0b1c3d;
border-radius:50%;
width:25px;
height:25px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="navbar">
Payment Status
</div>

<div class="container">

<input id="refInput" placeholder="Enter Reference ID">

<button onclick="checkStatus()">Check Status</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Checking status...</p>
</div>

<div id="result"></div>

</div>

<script>

/***********************
CONFIG
***********************/

const API="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

/***********************
GET REF FROM URL
***********************/

const params = new URLSearchParams(window.location.search);

const refFromURL = params.get("ref");

if(refFromURL){

document.getElementById("refInput").value = refFromURL;

checkStatus();

}

/***********************
CHECK STATUS
***********************/

function checkStatus(){

const ref = document.getElementById("refInput").value;

if(!ref){

alert("Enter reference ID");

return;

}

document.getElementById("loader").style.display="block";

const controller = new AbortController();

setTimeout(()=>{

controller.abort();

},10000);

fetch(API+"?action=status&ref="+ref,{
signal:controller.signal
})

.then(r=>r.json())

.then(data=>{

document.getElementById("loader").style.display="none";

if(data.error){

document.getElementById("result").innerHTML=
"<p>Reference not found</p>";

return;

}

document.getElementById("result").innerHTML=

`<div class="result">

<div class="row"><b>Name:</b> ${data.name}</div>

<div class="row"><b>Village:</b> ${data.village}</div>

<div class="row"><b>Amount:</b> ₹${data.amount}</div>

<div class="row"><b>Date:</b> ${data.date}</div>

<div class="row"><b>Time:</b> ${data.time}</div>

<div class="row"><b>Status:</b> ${data.status}</div>

</div>`;

})

.catch(()=>{

document.getElementById("loader").style.display="none";

alert("Server not responding");

});

}

</script>

</body>
</html>
