<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.navbar{
background:#0b1c3d;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
}

.dashboard{
text-align:center;
margin-bottom:20px;
}

.dashboard h1{
font-size:34px;
}

.cardRow{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
flex:1;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
font-size:14px;
}

th{
background:#0b1c3d;
color:white;
}

.statusVerified{
color:green;
font-weight:bold;
}

.statusPending{
color:#1a73e8;
font-weight:bold;
}

.statusRejected{
color:red;
font-weight:bold;
}

.modifiedRow{
background:#f0f3ff;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.verifyBtn{
background:#28a745;
color:white;
}

.rejectBtn{
background:#dc3545;
color:white;
}

.saveBtn{
background:#007bff;
color:white;
margin-top:15px;
}

.logoutBtn{
background:red;
color:white;
}

.timer{
font-size:18px;
font-weight:bold;
}

.blink{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3}
}

.loadingBar{
width:100%;
height:4px;
background:#ddd;
overflow:hidden;
}

.loadingProgress{
width:0%;
height:100%;
background:#007bff;
animation:load 5s linear forwards;
}

@keyframes load{
0%{width:0%}
60%{width:80%}
90%{width:90%}
100%{width:100%}
}

</style>
</head>

<body>

<div class="navbar">

<div>
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="admin.html">Admin Panel</a>
</div>

<div>
<span class="timer" id="timer"></span>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

</div>

<div class="loadingBar" id="loadingBar" style="display:none">
<div class="loadingProgress"></div>
</div>

<div class="container">

<div class="dashboard">

<h1 id="welcomeText">Admin Dashboard</h1>

</div>

<div class="cardRow">

<div class="card">
<h3>Total Amount</h3>
<p id="totalAmount">₹0</p>
</div>

<div class="card">
<h3>Verified</h3>
<p id="verifiedAmount">₹0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingAmount">₹0</p>
</div>

<div class="card">
<h3>Not Verified</h3>
<p id="notAmount">₹0</p>
</div>

</div>

<canvas id="chart" height="100"></canvas>

<h2>Payments</h2>

<table id="paymentTable">
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>RefID</th>
<th>Name</th>
<th>Village</th>
<th>Phone</th>
<th>Amount</th>
<th>UTR</th>
<th>Status</th>
<th>Count</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="saveBtn" id="saveBtn" disabled onclick="saveChanges()">Save Changes</button>

<h2 style="margin-top:40px">Complaints</h2>

<table id="complaintTable">
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Phone</th>
<th>Complaint</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="saveBtn" onclick="saveComplaints()">Save Complaint Changes</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

let sessionTime=1800;
let changes=[];
let complaintChanges=[];

function startTimer(){

const timer=document.getElementById("timer");

setInterval(()=>{

sessionTime--;

let m=Math.floor(sessionTime/60);
let s=sessionTime%60;

timer.innerText=`${m}:${s}`;

if(sessionTime<300){
timer.classList.add("blink");
timer.style.color="red";
}

if(sessionTime<=0){
logout();
}

},1000)

}

function logout(){

localStorage.removeItem("adminToken");
window.location="index.html";

}

function loadPayments(){

document.getElementById("loadingBar").style.display="block";

fetch(API_URL+"?action=getPayments")
.then(r=>r.json())
.then(data=>{

document.getElementById("loadingBar").style.display="none";

let tbody=document.querySelector("#paymentTable tbody");
tbody.innerHTML="";

data.forEach(row=>{

let tr=document.createElement("tr");

let statusClass="";

if(row.status=="Verified") statusClass="statusVerified";
if(row.status=="Pending") statusClass="statusPending";
if(row.status=="Not Verified") statusClass="statusRejected";

tr.innerHTML=`
<td>${row.date}</td>
<td>${row.time}</td>
<td>${row.ref}</td>
<td>${row.name}</td>
<td>${row.village}</td>
<td>${row.phone}</td>
<td>${row.amount}</td>
<td>${row.utr}</td>
<td class="${statusClass}">${row.status}</td>
<td>${row.count}</td>
<td>
<button class="verifyBtn" onclick="mark('${row.ref}','Verified',this)">✓</button>
<button class="rejectBtn" onclick="mark('${row.ref}','Not Verified',this)">✗</button>
</td>
`;

tbody.appendChild(tr);

});

})

}

function mark(ref,status,btn){

let tr=btn.closest("tr");

tr.classList.add("modifiedRow");

changes.push({
ref:ref,
status:status
});

document.getElementById("saveBtn").disabled=false;

}

function saveChanges(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"updatePayments",
data:changes
})
}).then(()=>{

alert("Sheet Updated Successfully");

changes=[];

document.getElementById("saveBtn").disabled=true;

loadPayments();

})

}

function loadComplaints(){

fetch(API_URL+"?action=getComplaints")
.then(r=>r.json())
.then(data=>{

let tbody=document.querySelector("#complaintTable tbody");

tbody.innerHTML="";

data.forEach(c=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${c.date}</td>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.text}</td>
<td>${c.status}</td>
<td>
<button onclick="resolveComplaint('${c.id}',this)">Resolve</button>
</td>
`;

tbody.appendChild(tr);

})

})

}

function resolveComplaint(id,btn){

complaintChanges.push(id);

btn.closest("tr").classList.add("modifiedRow");

}

function saveComplaints(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"resolveComplaints",
ids:complaintChanges
})
}).then(()=>{

alert("Complaints Updated");

complaintChanges=[];

loadComplaints();

})

}

function loadAnalytics(){

fetch(API_URL+"?action=analytics")
.then(r=>r.json())
.then(data=>{

document.getElementById("totalAmount").innerText="₹"+data.total;
document.getElementById("verifiedAmount").innerText="₹"+data.verified;
document.getElementById("pendingAmount").innerText="₹"+data.pending;
document.getElementById("notAmount").innerText="₹"+data.notverified;

new Chart(document.getElementById("chart"),{

type:"pie",

data:{
labels:["Verified","Pending","Not Verified"],
datasets:[{
data:[data.verified,data.pending,data.notverified]
}]
}

});

})

}

startTimer();
loadPayments();
loadComplaints();
loadAnalytics();

</script>

</body>
</html>
