<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#eef2f8;
margin:0;
}

/* NAVBAR */

.navbar{
background:#0b1c3d;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* LOGIN */

.loginBox{
width:320px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0b1c3d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#142b60;
}

/* DASHBOARD */

.dashboard{
display:none;
width:90%;
margin:auto;
margin-top:30px;
}

/* CARD */

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
font-size:14px;
}

th{
background:#0b1c3d;
color:white;
}

/* LOADER */

.loader{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid #0b1c3d;
border-radius:50%;
width:24px;
height:24px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="navbar">
Admin Dashboard
</div>

<!-- LOGIN -->

<div class="loginBox" id="loginBox">

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="loader" id="loginLoader">
<div class="spinner"></div>
</div>

</div>


<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="card">

<h3>Verify Payment</h3>

<input id="verifyRef" placeholder="Reference ID">

<select id="status">
<option>Verified</option>
<option>Rejected</option>
</select>

<button onclick="updateStatus()">Update Status</button>

</div>


<div class="card">

<h3>Fraud Detection</h3>

<button onclick="loadFraud()">Check Fraud</button>

<div id="fraudResult"></div>

</div>


<div class="card">

<h3>Village Ranking</h3>

<button onclick="loadRanking()">Load Ranking</button>

<table id="rankingTable">

<tr>
<th>Village</th>
<th>Amount</th>
</tr>

</table>

</div>


<div class="card">

<h3>Complaints</h3>

<button onclick="loadComplaints()">Load Complaints</button>

<table id="complaintTable">

<tr>
<th>Name</th>
<th>Village</th>
<th>Complaint</th>
<th>Status</th>
</tr>

</table>

</div>

</div>


<script>

/***********************
CONFIG
***********************/

const API="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

let token="";

/***********************
LOGIN
***********************/

function login(){

const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

if(!user||!pass){

alert("Enter credentials");

return;

}

document.getElementById("loginLoader").style.display="block";

const controller=new AbortController();

setTimeout(()=>{

controller.abort();

},10000);

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"login",
user:user,
pass:pass
}),
signal:controller.signal
})

.then(r=>r.json())

.then(res=>{

document.getElementById("loginLoader").style.display="none";

if(res.status==="success"){

token=res.token;

document.getElementById("loginBox").style.display="none";

document.getElementById("dashboard").style.display="block";

}else{

alert("Invalid login");

}

})

.catch(()=>{

document.getElementById("loginLoader").style.display="none";

alert("Server not responding");

});

}


/***********************
UPDATE STATUS
***********************/

function updateStatus(){

const ref=document.getElementById("verifyRef").value;

const status=document.getElementById("status").value;

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"updateStatus",
ref:ref,
status:status,
admin:"admin"
})
})

.then(r=>r.json())

.then(res=>{

alert("Status updated");

});

}


/***********************
LOAD FRAUD
***********************/

function loadFraud(){

fetch(API+"?action=fraud")

.then(r=>r.json())

.then(data=>{

let html="<ul>";

data.forEach(f=>{

html+="<li>"+f+"</li>";

});

html+="</ul>";

document.getElementById("fraudResult").innerHTML=html;

});

}


/***********************
VILLAGE RANKING
***********************/

function loadRanking(){

fetch(API+"?action=ranking")

.then(r=>r.json())

.then(data=>{

let table=document.getElementById("rankingTable");

data.forEach(r=>{

let row=table.insertRow();

row.insertCell(0).innerText=r.village;

row.insertCell(1).innerText=r.amount;

});

});

}


/***********************
LOAD COMPLAINTS
***********************/

function loadComplaints(){

fetch(API+"?action=complaints")

.then(r=>r.json())

.then(data=>{

let table=document.getElementById("complaintTable");

data.forEach(c=>{

let row=table.insertRow();

row.insertCell(0).innerText=c.name;

row.insertCell(1).innerText=c.village;

row.insertCell(2).innerText=c.complaint;

row.insertCell(3).innerText=c.status;

});

});

}

</script>

</body>
</html>
