<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body { font-family: Arial; background:#f2f2f2; text-align:center; }
table { margin:auto; border-collapse: collapse; width:95%; background:white;}
th,td { padding:8px; border:1px solid #ddd; }
button { padding:5px 10px; cursor:pointer; margin:2px; }
.top { margin:20px; font-size:18px; }
.navbar { background:#1e1e2f;padding:15px;text-align:center; }
.navbar a { color:white;margin:0 15px;text-decoration:none;font-weight:bold; }
.logout { float:right; background:red; color:white; border:none; padding:6px 12px; }
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="status.html">Verify Status</a>
  <span style="color:white;">Admin Panel</span>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const scriptURL="YOUR_EXEC_URL_HERE";

// Session Login
if(sessionStorage.getItem("adminLoggedIn")!=="true"){
    const password=prompt("Enter Admin Password:");
    if(password==="admin123"){
        sessionStorage.setItem("adminLoggedIn","true");
    } else {
        alert("Access Denied");
        window.location.href="index.html";
    }
}
</script>

<h2>Admin Dashboard</h2>

<div class="top">
Total: ₹<span id="total">0</span> |
Verified: ₹<span id="verified">0</span>
</div>

<table id="table">
<tr>
<th>Date</th>
<th>RefID</th>
<th>Name</th>
<th>Village</th>
<th>Phone</th>
<th>Amount</th>
<th>UTR</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

<script>

function loadTable(){
fetch(scriptURL+"?action=getAll")
.then(res=>res.json())
.then(data=>{
  let total=0, verified=0;

  document.querySelectorAll("#table tr:not(:first-child)").forEach(el=>el.remove());

  data.forEach(row=>{
    total+=Number(row[5]);
    if(row[7]==="Verified") verified+=Number(row[5]);

    const tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${row[0]}</td>
    <td>${row[1]}</td>
    <td>${row[2]}</td>
    <td>${row[3]}</td>
    <td>${row[4]}</td>
    <td>${row[5]}</td>
    <td>${row[6]}</td>
    <td>${row[7]}</td>
    <td>
      <button onclick="updateStatus('${row[1]}','Verified')">✓</button>
      <button onclick="updateStatus('${row[1]}','Rejected')">✗</button>
    </td>`;

    document.getElementById("table").appendChild(tr);
  });

  document.getElementById("total").innerText=total;
  document.getElementById("verified").innerText=verified;
});
}

function updateStatus(refid,status){

  const data=new URLSearchParams();
  data.append("action","updateStatus");
  data.append("refid",refid);
  data.append("status",status);

  fetch(scriptURL,{
    method:"POST",
    body:data
  })
  .then(res=>res.text())
  .then(()=>{
    loadTable();   // 🔥 reload table without page refresh
  });
}

function logout(){
  sessionStorage.removeItem("adminLoggedIn");
  window.location.href="index.html";
}

loadTable();
</script>

</body>
</html>
