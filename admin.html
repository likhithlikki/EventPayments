<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>
</div>

<div class="container">

<div class="dashboardTitle">
Admin Dashboard
</div>

<div class="topActions">

<span id="timer"></span>

<button class="pdfBtn" onclick="window.print()">Export PDF</button>

<button class="logoutBtn" onclick="logout()">Logout</button>

</div>

   <br><br>
  
<!-- INDEX STYLE LOADING BAR -->
<div id="message"></div>

<div class="dashboard">

<div class="summaryBoxes">

<div class="box">
<h4>Total Amount</h4>
<p id="totalAmount">₹0</p>
</div>

<div class="box">
<h4>Verified Amount</h4>
<p id="verifiedAmount">₹0</p>
</div>

<div class="box">
<h4>Pending Amount</h4>
<p id="pendingAmount">₹0</p>
</div>

<div class="box">
<h4>Not Verified Amount</h4>
<p id="notVerifiedAmount">₹0</p>
</div>


   
</div>

<div style="display:flex">

<div class="chartBox">
<canvas id="pieChart"></canvas>
</div>

<div class="legendBox">

<div class="legendItem">
<div class="legendColor green"></div> Verified
</div>

<div class="legendItem">
<div class="legendColor blue"></div> Pending
</div>

<div class="legendItem">
<div class="legendColor red"></div> Not Verified
</div>

</div>

</div>

</div>
   
<br><br><br><br><br>
   
<h2 class="sectionTitle">Event Payments</h2>

<div class="sortBar">

<select id="sortSelect" onchange="sortPayments()">

<option value="">Sort By</option>
<option value="amount">Amount</option>
<option value="date">Date</option>
<option value="village">Village</option>
<option value="name">Name</option>

</select>

</div>

<div id="paymentTable"></div>

  <div id="paymentLoader"></div>
<button class="saveBtn" onclick="savePayments()">Save Payment Changes</button>


  <br><br><br><br><br><br><br><br>
  
<h2 class="sectionTitle">Complaints</h2>

<div id="complaintTable"></div>

<div id="complaintLoader"></div>
<button class="saveBtn" onclick="saveComplaints()">Save Complaint Changes</button>


</div>

<h2 class="sectionTitle">Admin Activity</h2>
<div class="activityContainer">
<h3 class="activityTitle">Recent Admin Activity</h3>
<div id="adminActivity" class="activityList"></div>
</div>
   
<script src="admin.js"></script>

</body>
</html>
