<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>
</div>

<div class="container">

<div class="dashboardTitle">
Admin Dashboard
</div>

<div class="topActions">

<span id="timer"></span>

<button class="pdfBtn" onclick="window.print()">Export PDF</button>

<button class="logoutBtn" onclick="logout()">Logout</button>

</div>

<div id="pageLoader" class="loader"></div>

<div class="dashboard">

<div class="summaryBoxes">

<div class="box">
<h4>Total Amount</h4>
<p id="totalAmount">₹0</p>
</div>

<div class="box">
<h4>Verified Amount</h4>
<p id="verifiedAmount">₹0</p>
</div>

<div class="box">
<h4>Pending Amount</h4>
<p id="pendingAmount">₹0</p>
</div>

<div class="box">
<h4>Not Verified Amount</h4>
<p id="notVerifiedAmount">₹0</p>
</div>

</div>

<div style="display:flex">

<div class="chartBox">
<canvas id="pieChart"></canvas>
</div>

<div class="legendBox">

<div class="legendItem">
<div class="legendColor green"></div> Verified
</div>

<div class="legendItem">
<div class="legendColor blue"></div> Pending
</div>

<div class="legendItem">
<div class="legendColor red"></div> Not Verified
</div>

</div>

</div>

</div>

<h3>Event Payments</h3>

<div id="paymentTable"></div>

<button class="saveBtn" onclick="savePayments()">Save Payment Changes</button>
<div id="paymentLoader" class="loader"></div>

<h3>Complaints</h3>

<div id="complaintTable"></div>

<button class="saveBtn" onclick="saveComplaints()">Save Complaint Changes</button>
<div id="complaintLoader" class="loader"></div>

</div>

<script src="admin.js"></script>

</body>
</html>
