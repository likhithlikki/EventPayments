<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body { font-family: Arial; background:#f2f2f2; text-align:center; }

table { margin:auto; border-collapse: collapse; width:95%; background:white;}
th,td { padding:8px; border:1px solid #ddd; }

.navbar {
  background:#1e1e2f;
  padding:15px;
  text-align:center;
}

.navbar a {
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

.save-btn {
  background:green;
  color:white;
  padding:10px 18px;
  border:none;
  cursor:pointer;
  margin:15px;
  display:none;
}

.status-btn {
  cursor:pointer;
  padding:5px 10px;
  border:none;
  margin:2px;
}

.verified { background:green; color:white; }
.rejected { background:red; color:white; }
.pending { background:gray; color:white; }

.logout {
  float:right;
  background:red;
  color:white;
  border:none;
  padding:6px 12px;
}
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="status.html">Verify Status</a>
  <span style="color:white;">Admin Panel</span>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

if(sessionStorage.getItem("adminLoggedIn")!=="true"){
    const password=prompt("Enter Admin Password:");
    if(password==="admin123"){
        sessionStorage.setItem("adminLoggedIn","true");
    } else {
        alert("Access Denied");
        window.location.href="index.html";
    }
}
</script>

<h2>Admin Dashboard</h2>

<button id="saveBtn" class="save-btn" onclick="saveChanges()">Save Changes</button>

<div style="margin:10px;font-size:18px;">
Total: ₹<span id="total">0</span> |
Verified: ₹<span id="verified">0</span>
</div>

<table id="table">
<tr>
<th>Date</th>
<th>RefID</th>
<th>Name</th>
<th>Village</th>
<th>Phone</th>
<th>Amount</th>
<th>UTR</th>
<th>Status</th>
</tr>
</table>

<script>

let modifiedRows = [];
let tableData = [];

function loadTable(){

fetch(scriptURL + "?action=getAll")
.then(res=>res.json())
.then(data=>{

  tableData = data;

  const table=document.getElementById("table");

  // Remove old rows
  document.querySelectorAll("#table tr:not(:first-child)").forEach(e=>e.remove());

  let total=0;
  let verified=0;

  data.forEach(row=>{

    total += Number(row[5]);
    if(row[7]==="Verified") verified += Number(row[5]);

    const tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${row[0]}</td>
    <td>${row[1]}</td>
    <td>${row[2]}</td>
    <td>${row[3]}</td>
    <td>${row[4]}</td>
    <td>${row[5]}</td>
    <td>${row[6]}</td>
    <td id="status-${row[1]}">
      <button class="status-btn ${getClass(row[7])}" 
      onclick="changeStatus('${row[1]}','Verified')">✓</button>
      <button class="status-btn ${getClass(row[7])}" 
      onclick="changeStatus('${row[1]}','Rejected')">✗</button>
      <div>${row[7]}</div>
    </td>
    `;

    table.appendChild(tr);
  });

  document.getElementById("total").innerText=total;
  document.getElementById("verified").innerText=verified;

});
}

function getClass(status){
  if(status==="Verified") return "verified";
  if(status==="Rejected") return "rejected";
  return "pending";
}

function changeStatus(refid,newStatus){

  // Update UI immediately
  const statusCell=document.getElementById("status-"+refid);
  statusCell.innerHTML=`
    <button class="status-btn verified" 
    onclick="changeStatus('${refid}','Verified')">✓</button>
    <button class="status-btn rejected" 
    onclick="changeStatus('${refid}','Rejected')">✗</button>
    <div>${newStatus}</div>
  `;

  // Track modified
  const existing = modifiedRows.find(r=>r.refid===refid);

  if(existing){
    existing.status=newStatus;
  } else {
    modifiedRows.push({refid:refid,status:newStatus});
  }

  document.getElementById("saveBtn").style.display="inline-block";

  recalcTotals();
}

function recalcTotals(){

  let total=0;
  let verified=0;

  tableData.forEach(row=>{
    total += Number(row[5]);

    const modified = modifiedRows.find(r=>r.refid===row[1]);

    const currentStatus = modified ? modified.status : row[7];

    if(currentStatus==="Verified"){
      verified += Number(row[5]);
    }
  });

  document.getElementById("total").innerText=total;
  document.getElementById("verified").innerText=verified;
}

function saveChanges(){

  if(modifiedRows.length===0) return;

  const data=new URLSearchParams();
  data.append("action","bulkUpdate");
  data.append("data", JSON.stringify(modifiedRows));

  fetch(scriptURL,{
    method:"POST",
    body:data
  })
  .then(res=>res.text())
  .then(()=>{
    alert("Sheet data modified successfully");
    modifiedRows=[];
    document.getElementById("saveBtn").style.display="none";
    loadTable();
  });
}

function logout(){
  sessionStorage.removeItem("adminLoggedIn");
  window.location.href="index.html";
}

loadTable();

</script>

</body>
</html>
