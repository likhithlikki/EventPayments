<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.navbar{
background:#065f46;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:1100px;
margin:30px auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.logoutBtn{
background:#ef4444;
color:white;
}

.pdfBtn{
background:#2563eb;
color:white;
}

.saveBtn{
background:#10b981;
color:white;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

.pending{color:#3b82f6;font-weight:bold;}
.verified{color:#22c55e;font-weight:bold;}
.notverified{color:#ef4444;font-weight:bold;}

.modifiedRow{
background:#111827;
}

.progressBar{
width:100%;
background:#334155;
height:6px;
border-radius:4px;
overflow:hidden;
margin:10px 0;
}

.progressFill{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.3s linear;
}

.chartBox{
max-width:400px;
margin:auto;
}

@media print{
.navbar,.logoutBtn,.pdfBtn,.saveBtn{display:none;}
}

</style>
</head>

<body>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

/* ---------- SESSION CHECK ---------- */

const user=sessionStorage.getItem("adminUser");
const role=sessionStorage.getItem("adminRole");
const loginTime=sessionStorage.getItem("loginTime");

if(!user){
window.location="admin-login.html";
}

/* ---------- SESSION TIMER ---------- */

let sessionMinutes=10;

function startTimer(){

const timer=document.getElementById("timer");

setInterval(()=>{

const now=Date.now();

let remaining=sessionMinutes*60*1000-(now-loginTime);

if(remaining<=0){

alert("Session expired");
logout();

}

let min=Math.floor(remaining/60000);
let sec=Math.floor((remaining%60000)/1000);

timer.innerText="Session: "+min+":"+sec.toString().padStart(2,"0");

},1000);

}

/* ---------- LOGOUT ---------- */

function logout(){

const data=new URLSearchParams();

data.append("action","logoutAdmin");
data.append("admin",user);
data.append("role",role);

fetch(scriptURL,{method:"POST",body:data});

sessionStorage.clear();

window.location="admin-login.html";

}

/* ---------- EXPORT PDF ---------- */

function exportPDF(){
window.print();
}

</script>

<div class="navbar">

<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>

</div>

<div class="container">

<div class="topBar">

<h2>Admin Dashboard</h2>

<div>
<span id="timer"></span>
<button class="pdfBtn" onclick="exportPDF()">Export PDF</button>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

</div>

<div class="chartBox">
<canvas id="pieChart"></canvas>
</div>

<div id="summary"></div>

<div id="tableArea"></div>

<button class="saveBtn" id="saveBtn" onclick="saveChanges()" style="display:none">Save Changes</button>

</div>

<script>

let allData=[];
let modifiedRows=[];

/* ---------- PROGRESS BAR ---------- */

function startProgress(){

document.getElementById("tableArea").innerHTML=
'<div class="progressBar"><div class="progressFill" id="bar"></div></div>';

const bar=document.getElementById("bar");

setTimeout(()=>bar.style.width="80%",100);
setTimeout(()=>bar.style.width="95%",3000);

}

function finishProgress(){

const bar=document.getElementById("bar");

if(bar) bar.style.width="100%";

}

/* ---------- LOAD DATA ---------- */

startProgress();

fetch(scriptURL+"?action=getAllPayments")

.then(res=>res.json())

.then(data=>{

finishProgress();

allData=data;

renderTable(data);

createChart(data);

});

/* ---------- TABLE ---------- */

function renderTable(data){

let html="<table><tr><th>Date</th><th>Time</th><th>RefID</th><th>Name</th><th>Amount</th><th>Status</th>";

if(role==="SuperAdmin"){
html+="<th>Action</th>";
}

html+="</tr>";

data.forEach(row=>{

if(row[0]!=="Payment") return;

let cls="pending";

if(row[9]==="Verified") cls="verified";
if(row[9]==="Not Verified") cls="notverified";

html+=`
<tr>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[7]}</td>
<td class="${cls}">${row[9]}</td>
`;

if(role==="SuperAdmin"){

html+=`
<td>
<button onclick="changeStatus('${row[3]}','Verified')">✓</button>
<button onclick="changeStatus('${row[3]}','Not Verified')">✗</button>
</td>
`;

}

html+="</tr>";

});

html+="</table>";

document.getElementById("tableArea").innerHTML=html;

}

/* ---------- CHANGE STATUS ---------- */

function changeStatus(refid,status){

modifiedRows.push({refid,status});

document.getElementById("saveBtn").style.display="inline-block";

}

/* ---------- SAVE CHANGES ---------- */

function saveChanges(){

const data=new URLSearchParams();

data.append("action","bulkUpdate");
data.append("data",JSON.stringify(modifiedRows));
data.append("admin",user);
data.append("role",role);

fetch(scriptURL,{method:"POST",body:data})

.then(()=>{

alert("Updated successfully");

location.reload();

});

}

/* ---------- ANALYTICS PIE CHART ---------- */

function createChart(data){

let verified=0;
let pending=0;
let notverified=0;

data.forEach(r=>{

if(r[0]!=="Payment") return;

if(r[9]==="Verified") verified++;
if(r[9]==="Pending") pending++;
if(r[9]==="Not Verified") notverified++;

});

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{

labels:["Verified","Pending","Not Verified"],

datasets:[{
data:[verified,pending,notverified],
backgroundColor:["#22c55e","#3b82f6","#ef4444"]
}]

},

options:{
animation:{
animateRotate:true,
duration:1500
}
}

});

}

startTimer();

</script>

</body>
</html>
