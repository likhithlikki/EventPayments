<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  margin:0;
}

.navbar{
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.nav-left a{
  color:white;
  margin-right:15px;
  text-decoration:none;
  font-weight:bold;
}

.nav-right button{
  margin-left:10px;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.left-box{
  background:white;
  padding:20px;
  width:250px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.right-box{
  flex:1;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:8px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#eee;
}

.verified{color:green;font-weight:bold;}
.notverified{color:red;font-weight:bold;}
.pending{color:#007bff;font-weight:bold;}

.modified{
  background:#f0f8ff !important;
}

button{
  padding:6px 10px;
  border:none;
  cursor:pointer;
  border-radius:4px;
}

.verify-btn{background:green;color:white;}
.reject-btn{background:red;color:white;}

.save-btn{
  background:#007bff;
  color:white;
}

.save-btn:disabled{
  background:gray;
  cursor:not-allowed;
}

.pdf-btn{
  background:#444;
  color:white;
}

</style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">
    <a href="index.html">Home</a>
    <a href="status.html">Verify Status</a>
  </div>

  <div class="nav-right">
    <button id="saveBtn" class="save-btn" disabled onclick="saveChanges()">Save</button>
    <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
    <button onclick="logout()" style="background:red;color:white;">Logout</button>
  </div>
</div>

<div class="container">

  <div class="left-box">
    <h3>Summary</h3>
    <p>Total Amount: ₹<span id="total">0</span></p>
    <p>Verified Amount: ₹<span id="verified">0</span></p>
    <p>Pending Amount: ₹<span id="pendingTotal">0</span></p>
    <p>Not Verified Amount: ₹<span id="notVerified">0</span></p>
  </div>

  <div class="right-box">

    <table id="table">
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>RefID</th>
        <th>Name</th>
        <th>Village</th>
        <th>Phone</th>
        <th>Amount</th>
        <th>UTR</th>
        <th>Status</th>
        <th>Changes</th>
        <th>Action</th>
      </tr>
    </table>

  </div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

let modifiedRows=[];

fetch(scriptURL+"?action=getAll")
.then(res=>res.json())
.then(data=>{

let total=0,verified=0,pendingTotal=0,notVerified=0;

data.forEach(row=>{

total+=Number(row[6]);

if(row[8]==="Verified") verified+=Number(row[6]);
else if(row[8]==="Pending") pendingTotal+=Number(row[6]);
else notVerified+=Number(row[6]);

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[5]}</td>
<td>${row[6]}</td>
<td>${row[7]}</td>
<td id="status-${row[2]}" class="${
row[8]==='Verified'?'verified':
row[8]==='Not Verified'?'notverified':'pending'
}">
${row[8]}
</td>
<td>${row[9]}</td>
<td>
<button class="verify-btn" onclick="changeStatus('${row[2]}','Verified',this)">✓</button>
<button class="reject-btn" onclick="changeStatus('${row[2]}','Not Verified',this)">✗</button>
</td>
`;

document.getElementById("table").appendChild(tr);

});

document.getElementById("total").innerText=total;
document.getElementById("verified").innerText=verified;
document.getElementById("pendingTotal").innerText=pendingTotal;
document.getElementById("notVerified").innerText=notVerified;

});

function changeStatus(refid,newStatus,btn){

const cell=document.getElementById("status-"+refid);
cell.innerText=newStatus;

if(newStatus==="Verified") cell.className="verified";
else if(newStatus==="Not Verified") cell.className="notverified";
else cell.className="pending";

const rowElement=btn.closest("tr");
rowElement.classList.add("modified");

const existing=modifiedRows.find(r=>r.refid===refid);
if(existing) existing.status=newStatus;
else modifiedRows.push({refid:refid,status:newStatus});

document.getElementById("saveBtn").disabled=false;
}

function saveChanges(){

const data=new URLSearchParams();
data.append("action","bulkUpdate");
data.append("data",JSON.stringify(modifiedRows));

fetch(scriptURL,{method:"POST",body:data})
.then(()=>{
alert("Sheet updated successfully");
location.reload();
});
}

function downloadPDF(){

const printContent=document.getElementById("table").outerHTML;
const win=window.open("");
win.document.write(printContent);
win.print();
win.close();
}

function logout(){
sessionStorage.removeItem("adminLoggedIn");
window.location.href="index.html";
}

</script>

</body>
</html>
