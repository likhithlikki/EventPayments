<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#eef2fb;
margin:0;
}

/* NAVBAR */

.navbar{
background:#0b1c3d;
padding:14px;
display:flex;
justify-content:center;
gap:30px;
color:white;
font-weight:bold;
}

/* LOGIN */

#loginBox{
width:320px;
margin:120px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0b1c3d;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#142b66;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#0b1c3d;
color:white;
}

.statusSelect{
padding:5px;
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="navbar">
Admin Panel
</div>

<!-- LOGIN -->

<div id="loginBox">

<h3>Admin Login</h3>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="loginMsg"></div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<h2 id="welcome"></h2>

<h3>Payments</h3>

<table id="paymentTable">

<thead>

<tr>
<th>Ref</th>
<th>Name</th>
<th>Village</th>
<th>Phone</th>
<th>Amount</th>
<th>Status</th>
<th>Update</th>
</tr>

</thead>

<tbody></tbody>

</table>

<br>

<button onclick="saveStatus()">Save Changes</button>

<br><br>

<h3>Complaints</h3>

<table id="complaintTable">

<thead>

<tr>
<th>Name</th>
<th>Village</th>
<th>Complaint</th>
<th>Status</th>
<th>Resolve</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="loader" id="loader">
Loading...
</div>


<script>

const API="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";


let token="";
let role="";


/***********************
LOGIN
***********************/

function login(){

const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"login",
user:user,
pass:pass
})
})
.then(r=>r.json())
.then(data=>{

if(data.status=="success"){

token=data.token;
role=data.role;

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("welcome").innerText=
"Welcome "+role;

loadPayments();
loadComplaints();

}
else{

document.getElementById("loginMsg").innerText="Invalid login";

}

})
.catch(()=>{
alert("Server not responding");
});

}


/***********************
LOAD PAYMENTS
***********************/

function loadPayments(){

fetch(API+"?action=payments")
.then(r=>r.json())
.then(data=>{

const tbody=document.querySelector("#paymentTable tbody");
tbody.innerHTML="";

for(let i=1;i<data.length;i++){

let row=data[i];

let tr=document.createElement("tr");

tr.innerHTML=`

<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[5]}</td>
<td>${row[6]}</td>

<td>

<select class="statusSelect">

<option ${row[8]=="Pending"?"selected":""}>Pending</option>
<option ${row[8]=="Verified"?"selected":""}>Verified</option>
<option ${row[8]=="Rejected"?"selected":""}>Rejected</option>

</select>

</td>

<td>
<button onclick="updateRow(this,'${row[2]}')">Update</button>
</td>

`;

tbody.appendChild(tr);

}

});

}


/***********************
UPDATE PAYMENT
***********************/

function updateRow(btn,ref){

const status=
btn.parentElement.parentElement
.querySelector("select").value;

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"updateStatus",
ref:ref,
status:status,
admin:"admin"
})
})
.then(r=>r.json())
.then(res=>{
alert("Updated");
});

}


function saveStatus(){
loadPayments();
}


/***********************
LOAD COMPLAINTS
***********************/

function loadComplaints(){

fetch(API+"?action=complaints")
.then(r=>r.json())
.then(data=>{

const tbody=document.querySelector("#complaintTable tbody");
tbody.innerHTML="";

for(let i=1;i<data.length;i++){

let r=data[i];

let tr=document.createElement("tr");

tr.innerHTML=`

<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[6]}</td>
<td>${r[7]}</td>

<td>

<button onclick="resolveComplaint(${i+1})">
Resolve
</button>

</td>

`;

tbody.appendChild(tr);

}

});

}


/***********************
RESOLVE COMPLAINT
***********************/

function resolveComplaint(row){

const reply=prompt("Enter reply");

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"resolveComplaint",
row:row,
reply:reply
})
})
.then(r=>r.json())
.then(()=>{
alert("Resolved");
loadComplaints();
});

}

</script>

</body>
</html>
