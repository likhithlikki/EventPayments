<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body { font-family: Arial; background:#f2f2f2; text-align:center; }
table { margin:auto; border-collapse: collapse; width:95%; background:white;}
th,td { padding:8px; border:1px solid #ddd; }
select { padding:5px; }
.navbar { background:#1e1e2f;padding:15px;text-align:center; }
.navbar a { color:white;margin:0 15px;text-decoration:none;font-weight:bold; }
.save-btn {
  background:green;
  color:white;
  padding:8px 15px;
  border:none;
  cursor:pointer;
  margin:15px;
  display:none;
}
.logout { float:right; background:red; color:white; border:none; padding:6px 12px; }
</style>
</head>
<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="status.html">Verify Status</a>
  <span style="color:white;">Admin Panel</span>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

if(sessionStorage.getItem("adminLoggedIn")!=="true"){
    const password=prompt("Enter Admin Password:");
    if(password==="admin123"){
        sessionStorage.setItem("adminLoggedIn","true");
    } else {
        alert("Access Denied");
        window.location.href="index.html";
    }
}
</script>

<h2>Admin Dashboard</h2>

<button class="save-btn" id="saveBtn" onclick="saveChanges()">Save Changes</button>

<table id="table">
<tr>
<th>Date</th>
<th>RefID</th>
<th>Name</th>
<th>Village</th>
<th>Phone</th>
<th>Amount</th>
<th>UTR</th>
<th>Status</th>
</tr>
</table>

<script>

let modifiedRows = [];

function loadTable(){
fetch(scriptURL+"?action=getAll")
.then(res=>res.json())
.then(data=>{

  document.querySelectorAll("#table tr:not(:first-child)").forEach(el=>el.remove());

  data.forEach(row=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
    <td>${row[0]}</td>
    <td>${row[1]}</td>
    <td>${row[2]}</td>
    <td>${row[3]}</td>
    <td>${row[4]}</td>
    <td>${row[5]}</td>
    <td>${row[6]}</td>
    <td>
      <select onchange="markChanged('${row[1]}', this.value)">
        <option ${row[7]==="Pending"?"selected":""}>Pending</option>
        <option ${row[7]==="Verified"?"selected":""}>Verified</option>
        <option ${row[7]==="Rejected"?"selected":""}>Rejected</option>
      </select>
    </td>`;

    document.getElementById("table").appendChild(tr);
  });

});
}

function markChanged(refid,status){

  const existing = modifiedRows.find(r => r.refid === refid);

  if(existing){
    existing.status = status;
  } else {
    modifiedRows.push({refid, status});
  }

  document.getElementById("saveBtn").style.display="inline-block";
}

function saveChanges(){

  if(modifiedRows.length === 0) return;

  const data=new URLSearchParams();
  data.append("action","bulkUpdate");
  data.append("data", JSON.stringify(modifiedRows));

  fetch(scriptURL,{
    method:"POST",
    body:data
  })
  .then(res=>res.text())
  .then(()=>{
    alert("Saved Successfully");
    modifiedRows = [];
    document.getElementById("saveBtn").style.display="none";
    loadTable();
  });
}

function logout(){
  sessionStorage.removeItem("adminLoggedIn");
  window.location.href="index.html";
}

loadTable();
</script>

</body>
</html>
