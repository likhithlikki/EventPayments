<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.navbar{background:#065f46;padding:15px;text-align:center;}
.navbar a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
.container{padding:20px;}
table{width:100%;border-collapse:collapse;background:#1e293b;}
th,td{padding:8px;border:1px solid #334155;text-align:center;}
button{padding:5px 10px;border:none;border-radius:4px;cursor:pointer;}
.verified{color:#22c55e;}
.pending{color:#3b82f6;}
.notverified{color:#ef4444;}
.loader{border:4px solid #fff;border-top:4px solid #10b981;border-radius:50%;width:25px;height:25px;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<script>
if(prompt("Enter Admin Password")!=="admin123"){
alert("Access Denied");
window.location="index.html";
}
</script>

<div class="navbar">
<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>
</div>

<div class="container">
<h2>Admin Dashboard</h2>
<div id="summary"></div>
<div id="tableArea"><div class="loader"></div></div>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbwJyAXoVHvwcjV9DPQpMxbKvqMW38-gHE3i-VsG-7qpRy7B9nV4YAQw4xOwMbHgl17n/exec";

fetch(scriptURL+"?action=getAll")
.then(res=>res.json())
.then(data=>{

let total=0,verified=0,pending=0;
let html="<table><tr><th>Date</th><th>Time</th><th>RefID</th><th>Name</th><th>Amount</th><th>Status</th><th>Count</th><th>Action</th></tr>";

data.forEach(row=>{
if(row[0]!=="Payment") return;

total+=Number(row[7]);
if(row[9]==="Verified") verified+=Number(row[7]);
if(row[9]==="Pending") pending+=Number(row[7]);

let statusClass="pending";
if(row[9]==="Verified") statusClass="verified";
if(row[9]==="Not Verified") statusClass="notverified";

html+=`
<tr>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>${row[7]}</td>
<td class="${statusClass}">${row[9]}</td>
<td>${row[10]}</td>
<td>
<button onclick="update('${row[3]}','Verified')">✓</button>
<button onclick="update('${row[3]}','Not Verified')">✗</button>
</td>
</tr>`;
});

html+="</table>";
document.getElementById("tableArea").innerHTML=html;

document.getElementById("summary").innerHTML=
`Total: ₹${total} | Verified: ₹${verified} | Pending: ₹${pending}`;

});

function update(refid,status){

const data=new URLSearchParams();
data.append("action","updateStatus");
data.append("refid",refid);
data.append("status",status);

fetch(scriptURL,{method:"POST",body:data})
.then(()=>location.reload());
}
</script>

</body>
</html>
