<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="navbar">

<a href="index.html">Home</a>
<a href="status.html">Verify Status</a>
<a href="complaint.html">Complaint</a>
<a href="admin.html">Admin</a>

</div>

<div class="container">

<div class="topBar">

<h2>Admin Dashboard</h2>

<div>

<span id="timer"></span>

<button class="pdfBtn" onclick="window.print()">Export PDF</button>

<button class="logoutBtn" onclick="logout()">Logout</button>

</div>

</div>


<div class="summaryChart">

<div class="summaryBoxes">

<div class="box">
<h4>Total Amount</h4>
<p id="totalAmount">0</p>
</div>

<div class="box">
<h4>Verified</h4>
<p id="verifiedAmount">0</p>
</div>

<div class="box">
<h4>Pending</h4>
<p id="pendingAmount">0</p>
</div>

<div class="box">
<h4>Not Verified</h4>
<p id="notVerifiedAmount">0</p>
</div>

</div>

<div class="chartBox">

<canvas id="pieChart"></canvas>

</div>

</div>


<h3>Event Payments</h3>

<div id="paymentTable"></div>

<button id="savePayments" class="saveBtn">Save Payment Changes</button>


<h3>Complaints</h3>

<div id="complaintTable"></div>

<button id="saveComplaints" class="saveBtn">Save Complaint Changes</button>

</div>

<script src="admin.js"></script>

</body>

</html>
